# Pre-commit hooks do Hemiciclo 2.0
# Espelha o que o CI roda. Hooks locais (validar_topicos, validar_adr) entram
# em S27 e S37 respectivamente, junto dos scripts que eles invocam.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: [pydantic, pydantic-settings, types-PyYAML]
        args: [--strict]
        files: ^src/hemiciclo/
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: detect-private-key
  - repo: local
    hooks:
      - id: validar-topicos
        name: validar topicos YAML
        description: "Valida topicos/*.yaml contra topicos/_schema.yaml (S27)."
        entry: python scripts/validar_topicos.py
        language: system
        pass_filenames: false
        files: ^topicos/.*\.yaml$
        additional_dependencies: []
