name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  test:
    name: Pre-release CI / ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
        python: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Sync dependencies
        run: uv sync --frozen --all-extras

      - name: Validar ADRs
        run: uv run python scripts/validar_adr.py

      - name: Ruff check
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Mypy strict
        run: uv run mypy --strict src

      - name: Pytest
        run: uv run pytest tests/unit tests/integracao --cov=src/hemiciclo --cov-report=term-missing

  publish:
    name: Publish placeholder (S38)
    runs-on: ubuntu-22.04
    needs: test
    steps:
      - name: Placeholder
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          echo "Build/publish artefatos sera implementado na sprint S38."
          echo "Tag corrente: $TAG_NAME"
