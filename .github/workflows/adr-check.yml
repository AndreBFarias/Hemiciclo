name: ADR Check

on:
  pull_request:
    paths:
      - "docs/adr/**"
      - "scripts/validar_adr.py"
      - "tests/unit/test_validar_adr.py"

permissions:
  contents: read

jobs:
  validate-adr:
    name: Validar formato MADR
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --frozen --all-extras

      - name: Rodar validador
        run: uv run python scripts/validar_adr.py

      - name: Testes do validador
        run: uv run pytest tests/unit/test_validar_adr.py -v
